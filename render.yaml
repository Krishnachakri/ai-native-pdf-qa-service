services:
  - type: web
    name: ai-native-pdf-qa-service
    env: docker
    dockerfilePath: Dockerfile
    plan: starter
    # Path Render checks to verify service health during deploy rolling updates
    healthCheckPath: /health
    disk:
      name: chroma-storage
      mountPath: /app/chroma_data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set manually in Render dashboard
      - key: CHROMA_DATA_PATH
        value: /app/chroma_data
      - key: MAX_FILE_SIZE_BYTES
        value: "10485760" # 10MB limit
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: TOP_K
        value: "4"
      - key: SIM_THRESHOLD
        value: "0.5"
      - key: PROMPT_VERSION
        value: "v1.0"
      - key: LLM_PROVIDER
        value: "openai"
      - key: EMBEDDING_MODEL_NAME
        value: "all-MiniLM-L6-v2"
