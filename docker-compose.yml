version: '3.8'

services:
  rag-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Persists ChromaDB vector data on the host machine
      - ./chroma_data:/app/chroma_data
    environment:
      # Inject configurations from host or .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CHROMA_DATA_PATH=/app/chroma_data
      - MAX_FILE_SIZE_BYTES=${MAX_FILE_SIZE_BYTES:-10485760} # Default 10MB
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - TOP_K=${TOP_K:-4}
      - SIM_THRESHOLD=${SIM_THRESHOLD:-0.5}
      - PROMPT_VERSION=${PROMPT_VERSION:-v1.0}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-all-MiniLM-L6-v2}
    restart: unless-stopped
